name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-setuptools \
          libffi-dev libssl-dev libltdl-dev zlib1g-dev openjdk-17-jdk \
          autoconf automake libtool pkg-config cmake

      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --upgrade pip
          # أضفنا Cython هنا لأنه هو اللي موقفنا الآن
          python3 -m pip install --user --upgrade buildozer cython==0.29.33 --break-system-packages || python3 -m pip install --user --upgrade buildozer cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          USER: root

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
