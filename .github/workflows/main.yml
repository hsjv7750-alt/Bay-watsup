name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev python3-pip zip unzip \
          openjdk-17-jdk libssl-dev libffi-dev libltdl-dev zlib1g-dev \
          autoconf automake libtool pkg-config cmake

      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user "buildozer==1.5.0" "cython<3.0"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        timeout-minutes: 90
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          buildozer -v android debug
        env:
          USER: runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ByWhats-Final-App
          path: bin/*.apk
