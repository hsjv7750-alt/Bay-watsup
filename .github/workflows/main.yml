name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-setuptools \
          libffi-dev libssl-dev libltdl-dev zlib1g-dev openjdk-17-jdk \
          autoconf automake libtool pkg-config cmake zip unzip

      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --user --upgrade "buildozer==1.5.0" "cython<3.0"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: |
          # حذف أي بناء سابق معلق لضمان بداية نظيفة
          rm -rf .buildozer
          yes | buildozer android debug
        env:
          USER: root

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Final-WhatsApp-App
          path: bin/*.apk
